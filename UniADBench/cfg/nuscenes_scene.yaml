  uniad_group_pkls:
#    pseudo_nuscenes_root: <path-to-local-resource>
    pseudo_nuscenes_root: <path-to-local-resource>
    expected_groups: [aggressive_dense,aggressive_sparse, idle, turning]
    max_sweeps: 0
    future_steps: 16
    future_step_time: 0.5
    original_token_len: 32
    output:
      root_dir: <path-to-local-resource>
      subdir: val_group_pkls
      prefix: val

