dataset:
  name: nuscenes
  dataroot: <path-to-local-resource>
  version: interp_12Hz_trainval
  can_bus_root_path: <path-to-local-resource>
  camera_names:
    - CAM_FRONT_LEFT
    - CAM_FRONT
    - CAM_FRONT_RIGHT
    - CAM_BACK_RIGHT
    - CAM_BACK
    - CAM_BACK_LEFT

input:
  video_dir: <path-to-local-resource>
  preview_npy_dir: <path-to-local-resource>
  token_dir: <path-to-local-resource>
  num_frames: 36

window:
  size: 10
  stride: 10

task:
  name: uniad_group_pkls

